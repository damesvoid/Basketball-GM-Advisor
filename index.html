<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini's BBGM Advisor</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .upload-zone { border: 2px dashed #444; padding: 30px; text-align: center; border-radius: 8px; background: #242424; margin-bottom: 20px; }
        input[type="file"] { display: none; }
        .btn { background: #007acc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #005999; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #242424; border-radius: 6px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #333; color: #fff; }
        tr:hover { background: #2d2d2d; }
        .badge { background: #ff9800; color: black; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; font-weight: bold; margin-right: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏀 Basketball GM Advisor (Alpha)</h2>
        <div class="upload-zone">
            <p>Export your BBGM league data (.json) and upload it here:</p>
            <input type="file" id="fileInput" accept=".json">
            <button class="btn" onclick="document.getElementById('fileInput').click()">Choose BBGM Export File</button>
        </div>
        <div id="output"></div>
    </div>

    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    analyzeLeague(data);
                } catch (err) {
                    alert("Error parsing JSON. Make sure this is a valid ZenGM export!");
                    console.error(err);
                }
            };
            reader.readAsText(file);
        });

        function analyzeLeague(data) {
            // Grab active players
            const players = data.players || [];
            const activePlayers = players.filter(p => !p.retired);
            
            // Sort by current overall rating (using their latest ratings object)
            activePlayers.forEach(p => {
                p.latestRatings = p.ratings[p.ratings.length - 1];
            });
            activePlayers.sort((a, b) => b.latestRatings.ovr - a.latestRatings.ovr);

            let html = `<h3>Top 20 Active Players in League</h3>`;
            html += `<table>
                        <tr>
                            <th>Name</th>
                            <th>Pos</th>
                            <th>Age</th>
                            <th>OVR</th>
                            <th>POT</th>
                            <th>Skills</th>
                        </tr>`;

            // Display top 20 for preview
            activePlayers.slice(0, 20).forEach(p => {
                const rat = p.latestRatings;
                const badges = rat.skills ? rat.skills.map(s => `<span class="badge">${s}</span>`).join('') : '';
                html += `<tr>
                            <td><b>${p.firstName} ${p.lastName}</b></td>
                            <td>${rat.pos}</td>
                            <td>${data.gameAttributes.season - p.born.year}</td>
                            <td><span style="color:#4caf50; font-weight:bold;">${rat.ovr}</span></td>
                            <td>${rat.pot}</td>
                            <td>${badges}</td>
                         </tr>`;
            });
            html += `</table>`;
            
            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>
</html>
